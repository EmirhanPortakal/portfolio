<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oyun Geliştirici Portfolyo — Sürüş Demosu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#6FB8E8;
    --sky-bottom:#FDEFC9;
    --grass:#5FAE63;
    --sand:#E8C87E;
    --coral:#FF6B4A;
    --navy:#26304A;
    --cream:#FFF7E8;
    --gold:#FFC857;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;
    font-family:'Fredoka',sans-serif;background:#000;}
  #canvas-holder{position:fixed;inset:0;}
  canvas{display:block;touch-action:none;}

  #hud{position:fixed;inset:0;pointer-events:none;z-index:10;}
  #title{
    position:absolute;top:22px;left:24px;
    color:var(--navy);
    background:var(--cream);
    padding:10px 18px;
    border-radius:14px;
    border:3px solid var(--navy);
    box-shadow:4px 4px 0 var(--navy);
    font-size:18px;
    font-weight:600;
    letter-spacing:0.3px;
  }
  #title span{display:block;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:400;color:#5a6484;margin-top:2px;}

  #controls-hint{
    position:absolute;bottom:22px;left:24px;
    background:rgba(38,48,74,0.85);
    color:var(--cream);
    padding:10px 16px;
    border-radius:12px;
    font-family:'JetBrains Mono',monospace;
    font-size:12.5px;
    line-height:1.6;
  }
  #controls-hint b{color:var(--gold);}

  #proximity{
    position:absolute;bottom:22px;left:50%;transform:translateX(-50%);
    background:var(--coral);
    color:white;
    padding:10px 22px;
    border-radius:999px;
    font-weight:600;
    font-size:14px;
    border:3px solid var(--navy);
    box-shadow:3px 3px 0 var(--navy);
    opacity:0;
    transition:opacity .2s ease, transform .2s ease;
  }
  #proximity.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #proximity kbd{
    background:var(--navy);
    padding:1px 7px;
    border-radius:5px;
    font-family:'JetBrains Mono',monospace;
    margin-left:6px;
  }

  #minimap-wrap{
    position:absolute;top:22px;right:24px;
    background:rgba(38,48,74,0.85);
    border-radius:14px;
    padding:8px;
  }
  #minimap{display:block;border-radius:8px;background:#3d8f45;}
  #minimap-label{
    text-align:center;color:var(--cream);
    font-family:'JetBrains Mono',monospace;font-size:10px;
    margin-top:4px;letter-spacing:1px;
  }

  #panel-overlay{
    position:fixed;inset:0;
    background:rgba(20,25,40,0.55);
    display:flex;align-items:center;justify-content:center;
    z-index:20;
    opacity:0;pointer-events:none;
    transition:opacity .25s ease;
  }
  #panel-overlay.open{opacity:1;pointer-events:all;}
  #panel{
    width:min(520px, 88vw);
    max-height:82vh;
    overflow-y:auto;
    background:var(--cream);
    border-radius:20px;
    border:4px solid var(--navy);
    box-shadow:8px 8px 0 var(--navy);
    padding:28px 30px;
    transform:translateY(16px) scale(0.97);
    transition:transform .25s ease;
  }
  #panel-overlay.open #panel{transform:translateY(0) scale(1);}
  #panel h2{margin:0 0 4px;color:var(--navy);font-size:24px;}
  #panel .tag{
    display:inline-block;font-family:'JetBrains Mono',monospace;
    font-size:11px;color:#8a6d1f;background:var(--gold);
    padding:2px 9px;border-radius:6px;margin-bottom:14px;
  }
  #panel p{color:#3a4260;line-height:1.55;font-size:14.5px;margin:0 0 10px;}
  #panel ul{margin:0 0 16px;padding-left:18px;color:#3a4260;font-size:14px;line-height:1.7;}
  #panel-close{
    margin-top:6px;
    background:var(--navy);color:var(--cream);
    border:none;padding:10px 20px;border-radius:10px;
    font-family:'Fredoka',sans-serif;font-weight:600;font-size:14px;
    cursor:pointer;
  }
  #panel-close:hover{background:#1a2138;}

  .game-card{
    margin-bottom:22px;padding-bottom:20px;
    border-bottom:2px dashed rgba(38,48,74,0.22);
  }
  .game-card:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
  .game-thumb{
    width:100%;aspect-ratio:16/9;border-radius:12px;
    background:repeating-linear-gradient(45deg, #eee, #eee 10px, #f6f2e6 10px, #f6f2e6 20px);
    display:flex;align-items:center;justify-content:center;
    color:#9a9188;font-size:11.5px;font-family:'JetBrains Mono',monospace;
    margin-bottom:10px;overflow:hidden;
  }
  .game-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .game-title{
    display:inline-flex;align-items:center;gap:6px;
    font-size:17px;font-weight:600;color:#1b4f9c;
    text-decoration:none;margin-bottom:6px;
  }
  .game-title:hover{text-decoration:underline;}

  #note{
    position:absolute;bottom:22px;right:24px;
    max-width:230px;
    background:rgba(255,255,255,0.85);
    color:var(--navy);
    padding:10px 14px;border-radius:12px;
    font-size:11.5px;line-height:1.5;
    font-family:'JetBrains Mono',monospace;
  }

  #lang-switch{
    position:absolute;top:22px;left:50%;transform:translateX(-50%);
    display:flex;gap:4px;
    background:var(--cream);
    border:3px solid var(--navy);
    border-radius:999px;
    padding:4px;
    box-shadow:4px 4px 0 var(--navy);
    pointer-events:auto;
  }
  .lang-btn{
    border:none;background:transparent;color:var(--navy);
    font-family:'JetBrains Mono',monospace;font-weight:600;font-size:12px;
    padding:6px 16px;border-radius:999px;cursor:pointer;
    transition:background .15s ease, color .15s ease;
  }
  .lang-btn.active{background:var(--coral);color:white;}
  .lang-btn:not(.active):hover{background:rgba(38,48,74,0.08);}

  #cv-download{
    position:absolute;top:78px;left:50%;transform:translateX(-50%);
    background:var(--gold);
    color:var(--navy);
    padding:8px 18px;
    border-radius:999px;
    border:3px solid var(--navy);
    box-shadow:3px 3px 0 var(--navy);
    font-family:'Fredoka',sans-serif;font-weight:600;font-size:12.5px;
    text-decoration:none;
    pointer-events:auto;
    transition:transform .12s ease;
  }
  #cv-download:hover{transform:translateX(-50%) translateY(-2px);}

  .cv-link-row{display:flex;gap:10px;margin-top:4px;}
  .cv-btn{
    flex:1;text-align:center;
    padding:10px 14px;border-radius:10px;
    font-family:'Fredoka',sans-serif;font-weight:600;font-size:13.5px;
    text-decoration:none;border:2px solid var(--navy);
  }
  .cv-btn.view{background:var(--cream);color:var(--navy);cursor:pointer;}
  .cv-btn.download{background:var(--navy);color:var(--cream);}

  #pdf-overlay{
    position:fixed;inset:0;
    background:rgba(20,25,40,0.72);
    display:flex;align-items:center;justify-content:center;
    z-index:30;
    opacity:0;pointer-events:none;
    transition:opacity .2s ease;
  }
  #pdf-overlay.open{opacity:1;pointer-events:all;}
  #pdf-modal{
    width:min(900px, 92vw);
    height:88vh;
    background:var(--cream);
    border-radius:16px;
    border:4px solid var(--navy);
    box-shadow:8px 8px 0 var(--navy);
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  #pdf-modal-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 18px;
    background:var(--navy);
    color:var(--cream);
    font-family:'Fredoka',sans-serif;font-weight:600;font-size:15px;
  }
  #pdf-close{
    background:var(--coral);color:white;
    border:2px solid var(--cream);
    padding:6px 14px;border-radius:8px;
    font-family:'Fredoka',sans-serif;font-weight:600;font-size:13px;
    cursor:pointer;
  }
  #pdf-close:hover{background:#e6553a;}
  #pdf-frame{flex:1;border:none;width:100%;background:#525659;}
</style>
</head>

<div id="canvas-holder"></div>

<div id="hud">
  <div id="title">Emirhan Portakal<span>game developer — teknik animasyon &amp; oynanış sistemleri</span></div>
  <div id="controls-hint"><b>W A S D</b> / ok tuşları — sür &nbsp;·&nbsp; <b>E</b> — tabelaya yaklaşınca aç</div>

  <div id="lang-switch">
    <button class="lang-btn active" data-lang="tr">TR</button>
    <button class="lang-btn" data-lang="en">EN</button>

  </div>
  <a id="cv-download" href="#" download="Emirhan_Portakal_CV.pdf">📄 CV İndir</a>
  <div id="minimap-wrap">
    <canvas id="minimap" width="140" height="140"></canvas>
    <div id="minimap-label">HARİTA</div>
  </div>
  <div id="note">emirhan-portakal.netlify.app</div>
</div>

<div id="panel-overlay">
  <div id="panel">
    <div class="tag" id="panel-tag">DURAK</div>
    <h2 id="panel-title">Başlık</h2>
    <div id="panel-body"></div>
    <button id="panel-close">Kapat</button>
  </div>
</div>

<div id="pdf-overlay">
  <div id="pdf-modal">
    <div id="pdf-modal-header">
      <span>📄 Emirhan Portakal — CV</span>
      <button id="pdf-close">✕ Kapat</button>
    </div>
    <iframe id="pdf-frame" src="" title="CV"></iframe>
  </div>
</div>

    const m = new THREE.Mesh(geo, mat);
    m.rotation.x = -Math.PI/2;
    m.rotation.z = -Math.atan2(dx, dz);

      desc:{
        tr:'Tek oyunculu, açık evrenli bir RPG ve üçüncü şahıs nişancı oyunu — rol yapma, madencilik, ticaret, korsanlık, üretim ve derin keşif gibi zengin özellikler barındırıyor. Hikaye SpaceBourne\'ün kaldığı yerden devam ediyor; oyuncunun amacı galakside yeni bir imparatorluk kurmak, bunu nasıl yapacağı tamamen oyuncuya kalmış.',
        en:'SpaceBourne 2 is a single-player, open-universe RPG and third-person shooter game with an abundance of features, including role-playing, mining, trading, piracy, crafting, and deep exploration. The story picks up where it left off in SpaceBourne, but now the player\'s goal is to build a new empire in the galaxy, with the methods of doing so being completely up to the player.',
        pl:'SpaceBourne 2 to jednoosobowe RPG w otwartym uniwersum oraz strzelanka TPP, oferująca mnóstwo funkcji: odgrywanie roli, wydobycie, handel, piractwo, wytwarzanie przedmiotów i głęboką eksplorację. Fabuła jest kontynuacją wydarzeń z SpaceBourne — celem gracza jest zbudowanie nowego imperium w galaktyce, a sposób osiągnięcia tego celu zależy wyłącznie od gracza.'

            <p>🌐 <a href="https://emirhan-portakal.netlify.app/" target="_blank" style="color:#26304A">emirhan-portakal.netlify.app</a></p>
            <p>📍 Karşıyaka, İzmir — Turkey</p>`,
        pl:`<p>📧 eportakal.business@gmail.com</p>
            <p>📱 +90 544 211 1519</p>
            <p>🌐 <a href="https://emirhan-portakal.netlify.app/" target="_blank" style="color:#26304A">emirhan-portakal.netlify.app</a></p>
            <p>📍 Karşıyaka, İzmir — Turcja</p>`
      }
    }
  ];

  zones.forEach(z=>addPathStrip(0,0, z.x, z.z, 5));
  zones.forEach(z=>addSandPad(z.x, z.z, 7));
  addSandPad(0,0,4);

  // ---------- tabela (sign) oluşturma ----------
  const signHeads = []; // kameraya bakacak pano+yazı grupları
  const signCanvases = []; // dil değişince metni yeniden çizmek için referanslar

  function drawSignText(ctx, text){
    const W = 288, H = 144, pad = 12;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = '#fff7e8';
    ctx.fillRect(pad,pad,W-2*pad,H-2*pad);
    ctx.fillStyle = '#26304A';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    const maxWidth = W - 2*pad - 18;
    const maxFont = 36, minFont = 15;

    // önce tek satıra sığdırmayı dene, fontu kademeli küçült
    let fontSize = maxFont;
    ctx.font = `bold ${fontSize}px sans-serif`;
    while (fontSize > minFont && ctx.measureText(text).width > maxWidth){
      fontSize -= 2;
      ctx.font = `bold ${fontSize}px sans-serif`;
    }

    if (ctx.measureText(text).width <= maxWidth){
      ctx.fillText(text, W/2, H/2);
      return;
    }

    // sığmıyorsa iki satıra böl (kelime sınırında, en dengeli noktadan)
    const words = text.split(' ');
    let line1, line2;
    if (words.length > 1){
      let bestSplit = 1, bestDiff = Infinity;
      for (let i=1; i<words.length; i++){
        const l1 = words.slice(0,i).join(' ');
        const l2 = words.slice(i).join(' ');
        const diff = Math.abs(l1.length - l2.length);
        if (diff < bestDiff){ bestDiff = diff; bestSplit = i; }
      }
      line1 = words.slice(0,bestSplit).join(' ');
      line2 = words.slice(bestSplit).join(' ');
    } else {
      const mid = Math.ceil(text.length/2);
      line1 = text.slice(0,mid);
      line2 = text.slice(mid);
    }

    let fs2 = Math.min(30, maxFont);
    ctx.font = `bold ${fs2}px sans-serif`;
    while (fs2 > minFont && (ctx.measureText(line1).width > maxWidth || ctx.measureText(line2).width > maxWidth)){
      fs2 -= 2;
      ctx.font = `bold ${fs2}px sans-serif`;
    }
    ctx.fillText(line1, W/2, H/2 - fs2*0.62);
    ctx.fillText(line2, W/2, H/2 + fs2*0.62);
  }

  function makeSign(zone){
    const postMat = new THREE.MeshStandardMaterial({color:0x26304A, roughness:0.7});
    const postGeo = new THREE.CylinderGeometry(0.25, 0.3, 3.2, 8);
    const post = new THREE.Mesh(postGeo, postMat);
    post.position.set(zone.x, 1.6, zone.z);
    post.castShadow = true;
    scene.add(post);

    // pano ve yazı: kameraya dönecek ayrı bir grup (direkten bağımsız)
    const signHead = new THREE.Group();
    signHead.position.set(zone.x, 3.4, zone.z);

    const boardMat = new THREE.MeshStandardMaterial({color:zone.color, roughness:0.5});
    const boardGeo = new THREE.BoxGeometry(3.8, 1.9, 0.25);
    const board = new THREE.Mesh(boardGeo, boardMat);
    board.castShadow = true;
    signHead.add(board);

    // basit metin dokusu (canvas) — dil değişince yeniden çizilecek
    const cnv = document.createElement('canvas');
    cnv.width = 288; cnv.height = 144;
    const ctx = cnv.getContext('2d');
    drawSignText(ctx, zone.name[currentLang]);
    const tex = new THREE.CanvasTexture(cnv);
    const labelMat = new THREE.MeshBasicMaterial({map:tex});
    const labelGeo = new THREE.PlaneGeometry(3.4, 1.7);
    const label = new THREE.Mesh(labelGeo, labelMat);
    label.position.set(0, 0, 0.14);
    signHead.add(label);

    signCanvases.push({zone, ctx, texture:tex});

    scene.add(signHead);
    signHeads.push(signHead);
    return signHead;
  }
  zones.forEach(makeSign);

  // ---------- ağaçlar (rastgele, duraklardan ve yollardan uzak) ----------
  function farEnough(x,z){
    if (Math.sqrt(x*x+z*z) < 8) return false;
    for (const zo of zones){
      if (Math.sqrt((x-zo.x)**2 + (z-zo.z)**2) < 9) return false;
    }
    return true;
  }
  function makeTree(x,z,scale){
    const g = new THREE.Group();
    const trunk = new THREE.Mesh(
      new THREE.CylinderGeometry(0.15,0.2,1.2,6),
      new THREE.MeshStandardMaterial({color:0x7A5230})
    );
    trunk.position.y = 0.6;
    trunk.castShadow = true;
    g.add(trunk);
    const leafColors = [0x4C9A4F, 0x5FAE63, 0x3E8A44];
    const leafColor = leafColors[Math.floor(Math.random()*leafColors.length)];
    const leaves = new THREE.Mesh(
      new THREE.ConeGeometry(1.1, 2.0, 7),
      new THREE.MeshStandardMaterial({color:leafColor})
    );
    leaves.position.y = 2.0;
    leaves.castShadow = true;
    g.add(leaves);
    g.position.set(x,0,z);
    g.scale.setScalar(scale);
    scene.add(g);
  }
  let placed = 0, attempts = 0;
  while (placed < 45 && attempts < 500){
    attempts++;
    const x = (Math.random()-0.5) * 90;
    const z = (Math.random()-0.5) * 90;
    if (farEnough(x,z)){
      makeTree(x,z, 0.8 + Math.random()*0.8);
      placed++;
    }
  }

  // ---------- araba ----------
  const car = new THREE.Group();
  const bodyMat = new THREE.MeshStandardMaterial({color:0xFF6B4A, roughness:0.4, metalness:0.1});
  const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 3.2), bodyMat);
  body.position.y = 0.55;
  body.castShadow = true;
  car.add(body);

  const cabinMat = new THREE.MeshStandardMaterial({color:0x26304A, roughness:0.3});
  const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.55, 1.6), cabinMat);
  cabin.position.set(0, 1.05, -0.1);
  cabin.castShadow = true;
  car.add(cabin);

  const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.35, 14);
  const wheelMat = new THREE.MeshStandardMaterial({color:0x1a1a1a, roughness:0.9});
  const wheelPositions = [
    [-1.0, 0.4, 1.1], [1.0, 0.4, 1.1],
    [-1.0, 0.4, -1.1], [1.0, 0.4, -1.1]
  ];
  const wheels = wheelPositions.map(p=>{
    const w = new THREE.Mesh(wheelGeo, wheelMat);
    w.rotation.z = Math.PI/2;
    w.position.set(p[0],p[1],p[2]);
    w.castShadow = true;
    car.add(w);
    return w;
  });

  car.position.set(0, 0, 6);
  scene.add(car);

  // yön oku — arabanın baktığı/gittiği yönü her zaman gösterir
  const dirArrow = new THREE.ArrowHelper(
    new THREE.Vector3(0, 0, -1), // yerel ileri yön (araba modeliyle tutarlı)
    new THREE.Vector3(0, 1.7, -1.6),
    2.4,
    0xFFC857,
    0.7,
    0.4
  );
  car.add(dirArrow);

  // ---------- araba fiziği (basit) ----------
  const keys = {};
  window.addEventListener('keydown', e=>{ keys[e.key.toLowerCase()] = true; });
  window.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()] = false; });

  let speed = 0;
  let heading = Math.PI; // start facing back toward origin path
  let steerInput = 0; // yumuşatılmış direksiyon girdisi (-1..1)
  const maxSpeed = 0.13;
  const accel = 0.005;
  const friction = 0.009;
  const turnRate = 0.026;
  const steerSmoothing = 0.07;

  // ---------- dokunarak/tıklayarak sürüş (mobil için) ----------
  const raycaster = new THREE.Raycaster();
  const groundPlane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
  let touchActive = false;
  const touchTarget = new THREE.Vector3();

  const touchMarker = new THREE.Mesh(
    new THREE.RingGeometry(0.6, 0.85, 24),
    new THREE.MeshBasicMaterial({color:0xFFC857, transparent:true, opacity:0.85, side:THREE.DoubleSide})
  );
  touchMarker.rotation.x = -Math.PI/2;
  touchMarker.visible = false;
  scene.add(touchMarker);

  function screenToGround(clientX, clientY){
    const rect = renderer.domElement.getBoundingClientRect();
    const ndcX = ((clientX - rect.left) / rect.width) * 2 - 1;
    const ndcY = -(((clientY - rect.top) / rect.height) * 2 - 1);
    raycaster.setFromCamera({x:ndcX, y:ndcY}, camera);
    const point = new THREE.Vector3();
    const hit = raycaster.ray.intersectPlane(groundPlane, point);
    return hit ? point : null;
  }

  function setTouchTarget(clientX, clientY){
    const point = screenToGround(clientX, clientY);
    if (point){
      touchActive = true;
      touchTarget.copy(point);
      touchMarker.position.set(point.x, 0.05, point.z);
      touchMarker.visible = true;
    }
  }

  renderer.domElement.addEventListener('pointerdown', e=>{
    setTouchTarget(e.clientX, e.clientY);
  });
  renderer.domElement.addEventListener('pointermove', e=>{
    if (touchActive) setTouchTarget(e.clientX, e.clientY);
  });
  function releaseTouch(){
    touchActive = false;
    touchMarker.visible = false;
  }
  renderer.domElement.addEventListener('pointerup', releaseTouch);
  renderer.domElement.addEventListener('pointercancel', releaseTouch);
  renderer.domElement.addEventListener('pointerleave', releaseTouch);

  function updateCar(){
    if (touchActive){
      // ---- dokunarak sürüş: arabayı hedefe doğru otomatik yönlendir ----
      const dx = touchTarget.x - car.position.x;
      const dz = touchTarget.z - car.position.z;
      const dist = Math.sqrt(dx*dx + dz*dz);

      if (dist > 1.2){
        const targetHeading = Math.atan2(-dx, -dz);
        let diff = targetHeading - heading;
        while (diff > Math.PI) diff -= Math.PI*2;
        while (diff < -Math.PI) diff += Math.PI*2;
        const steerTarget = Math.max(-1, Math.min(1, diff / 0.6));
        steerInput += (steerTarget - steerInput) * steerSmoothing;

        let targetSpeed = maxSpeed;
        if (dist < 6) targetSpeed *= Math.max(0.25, dist/6); // yaklaşınca yavaşla
        speed += (targetSpeed - speed) * 0.06;
      } else {
        // hedefe ulaşıldı — doğal şekilde yavaşla
        if (speed > 0) speed = Math.max(0, speed - friction);
        else if (speed < 0) speed = Math.min(0, speed + friction);
        steerInput *= 0.9;
      }

      const turnFactor = Math.max(0.35, Math.min(1, Math.abs(speed) / (maxSpeed * 0.4)));
      heading += turnRate * turnFactor * steerInput * (speed >= 0 ? 1 : -1);

      car.rotation.y = heading;
      car.position.x += -Math.sin(heading) * speed;
      car.position.z += -Math.cos(heading) * speed;

      const limit = 95;
      car.position.x = Math.max(-limit, Math.min(limit, car.position.x));
      car.position.z = Math.max(-limit, Math.min(limit, car.position.z));
      wheels.forEach(w => w.rotation.x -= speed * 3);
      return;
    }

    const forward = keys['w'] || keys['arrowup'];
    const back = keys['s'] || keys['arrowdown'];
    const left = keys['a'] || keys['arrowleft'];
    const right = keys['d'] || keys['arrowright'];

    if (forward) speed = Math.min(maxSpeed, speed + accel);
    else if (back) speed = Math.max(-maxSpeed*0.6, speed - accel);
    else {
      if (speed > 0) speed = Math.max(0, speed - friction);
      else if (speed < 0) speed = Math.min(0, speed + friction);
    }

    // direksiyon girdisini yumuşat (ani dönüşleri engeller)
    const steerTarget = (left ? 1 : 0) - (right ? 1 : 0);
    steerInput += (steerTarget - steerInput) * steerSmoothing;

    const turnFactor = Math.max(0.35, Math.min(1, Math.abs(speed) / (maxSpeed * 0.4)));
    heading += turnRate * turnFactor * steerInput * (speed >= 0 ? 1 : -1);

    car.rotation.y = heading;
    car.position.x += -Math.sin(heading) * speed;
    car.position.z += -Math.cos(heading) * speed;

    // dünya sınırları
    const limit = 95;
    car.position.x = Math.max(-limit, Math.min(limit, car.position.x));
    car.position.z = Math.max(-limit, Math.min(limit, car.position.z));

    // tekerlek dönüşü
    wheels.forEach(w => w.rotation.x -= speed * 3);
  }

  // ---------- kamera takip ----------
  const camOffset = new THREE.Vector3(0, 4.2, 8.5);
  const camTarget = new THREE.Vector3();
  function updateCamera(){
    const rotatedOffset = camOffset.clone();
    rotatedOffset.applyAxisAngle(new THREE.Vector3(0,1,0), heading);
    const desired = car.position.clone().add(rotatedOffset);
    camera.position.lerp(desired, 0.06);
    camTarget.lerp(car.position.clone().add(new THREE.Vector3(0,1.2,0)), 0.11);
    camera.lookAt(camTarget);
  }

  // ---------- yakınlık / panel ----------
  const proximityEl = document.getElementById('proximity');
  const panelOverlay = document.getElementById('panel-overlay');
  const panelTitle = document.getElementById('panel-title');
  const panelTag = document.getElementById('panel-tag');
  const panelBody = document.getElementById('panel-body');
  const panelClose = document.getElementById('panel-close');

  let nearestZone = null;
  let currentOpenZone = null;
  const triggerRadius = 8.5;

  const UI = {
    tr: {
      subtitle: 'game developer — teknik animasyon & oynanış sistemleri',
      controls: '<b>W A S D</b> / ok tuşları — sür &nbsp;·&nbsp; <b>dokun</b> — o yöne git &nbsp;·&nbsp; <b>E</b> — tabelaya yaklaşınca aç',
      mapLabel: 'HARİTA',
      close: 'Kapat',
      cvButton: '📄 CV İndir',
      proximity: (name) => `${name} tabelasına yaklaştın <kbd>E</kbd>`
    },
    en: {
      subtitle: 'game developer — technical animation & gameplay systems',
      controls: '<b>W A S D</b> / arrow keys — drive &nbsp;·&nbsp; <b>tap</b> — drive there &nbsp;·&nbsp; <b>E</b> — open when near a sign',
      mapLabel: 'MAP',
      close: 'Close',
      cvButton: '📄 Download CV',
      proximity: (name) => `Near the ${name} sign <kbd>E</kbd>`
    },
    pl: {
      subtitle: 'twórca gier — animacja techniczna i systemy rozgrywki',
      controls: '<b>W A S D</b> / strzałki — jedź &nbsp;·&nbsp; <b>dotknij</b> — jedź tam &nbsp;·&nbsp; <b>E</b> — otwórz przy tabliczce',
      mapLabel: 'MAPA',
      close: 'Zamknij',
      cvButton: '📄 Pobierz CV',
      proximity: (name) => `Blisko tabliczki ${name} <kbd>E</kbd>`
    }
  };

  function checkProximity(){
    let found = null;
    let bestDist = Infinity;
    for (const z of zones){
      const d = Math.sqrt((car.position.x - z.x)**2 + (car.position.z - z.z)**2);
      if (d < triggerRadius && d < bestDist){
        bestDist = d; found = z;
      }
    }
    nearestZone = found;
    if (found && panelOverlay.classList.contains('open') === false){
      proximityEl.classList.add('show');
      proximityEl.innerHTML = UI[currentLang].proximity(found.name[currentLang]);
    } else if (!found) {
      proximityEl.classList.remove('show');
    }
  }

  function openPanel(zone){
    currentOpenZone = zone;
    panelTag.textContent = zone.tag[currentLang];
    panelTitle.textContent = zone.name[currentLang];
    panelBody.innerHTML = zone.html[currentLang];
    panelOverlay.classList.add('open');
    proximityEl.classList.remove('show');
  }
  panelClose.addEventListener('click', ()=>{
    panelOverlay.classList.remove('open');
  });

  // ---------- CV indirme butonu (HUD) ----------
  const hudCvDownload = document.getElementById('cv-download');
  if (hudCvDownload) hudCvDownload.href = CV_DATA_URI;

  // ---------- CV görüntüleme modalı (aynı sayfada, iframe ile) ----------
  const pdfOverlay = document.getElementById('pdf-overlay');
  const pdfFrame = document.getElementById('pdf-frame');
  const pdfClose = document.getElementById('pdf-close');

  function openCvModal(){
    pdfFrame.src = CV_DATA_URI;
    pdfOverlay.classList.add('open');
  }
  function closeCvModal(){
    pdfOverlay.classList.remove('open');
    pdfFrame.src = ''; // belleği boşalt
  }
  pdfClose.addEventListener('click', closeCvModal);
  pdfOverlay.addEventListener('click', (e)=>{
    if (e.target === pdfOverlay) closeCvModal();
  });

  // panel içindeki "Görüntüle/View" butonuna tıklanınca modalı aç
  panelBody.addEventListener('click', (e)=>{
    if (e.target.closest('.cv-view-btn')) {
      openCvModal();
    }
  });

  window.addEventListener('keydown', e=>{
    if (e.key.toLowerCase() === 'e' && nearestZone && !panelOverlay.classList.contains('open')){
      openPanel(nearestZone);
    }
    if (e.key === 'Escape'){
      panelOverlay.classList.remove('open');
      closeCvModal();
    }
  });

  // ---------- dil değiştirme ----------
  function applyLanguage(){
    document.querySelector('#title span').textContent = UI[currentLang].subtitle;
    document.getElementById('controls-hint').innerHTML = UI[currentLang].controls;
    document.getElementById('minimap-label').textContent = UI[currentLang].mapLabel;
    panelClose.textContent = UI[currentLang].close;
    if (hudCvDownload) hudCvDownload.textContent = UI[currentLang].cvButton;

    // tabela metinlerini yeniden çiz
    signCanvases.forEach(sc=>{
      drawSignText(sc.ctx, sc.zone.name[currentLang]);
      sc.texture.needsUpdate = true;
    });

    // açık panel varsa içeriğini güncelle
    if (panelOverlay.classList.contains('open') && currentOpenZone){
      openPanel(currentOpenZone);
    }
  }

  const langButtons = document.querySelectorAll('.lang-btn');
  langButtons.forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if (btn.dataset.lang === currentLang) return;
      currentLang = btn.dataset.lang;
      langButtons.forEach(b=>b.classList.toggle('active', b === btn));
      applyLanguage();
    });
  });

  // ---------- minimap ----------
  const mmCanvas = document.getElementById('minimap');
  const mmCtx = mmCanvas.getContext('2d');
  const mmRange = 60; // world units shown in half-size
  function worldToMap(x,z){
    return [
      70 + (x / mmRange) * 60,
      70 + (z / mmRange) * 60
    ];
  }
  function drawMinimap(){
    mmCtx.clearRect(0,0,140,140);
    mmCtx.fillStyle = '#3d8f45';
    mmCtx.fillRect(0,0,140,140);
    // zones
    zones.forEach(z=>{
      const [mx,my] = worldToMap(z.x, z.z);
      mmCtx.fillStyle = '#' + z.color.toString(16).padStart(6,'0');
      mmCtx.beginPath();
      mmCtx.arc(mx,my,5,0,Math.PI*2);
      mmCtx.fill();
    });
    // car
    const [cx,cy] = worldToMap(car.position.x, car.position.z);
    mmCtx.save();
    mmCtx.translate(cx,cy);
    mmCtx.rotate(-heading);
    mmCtx.fillStyle = '#FFF7E8';
    mmCtx.beginPath();
    mmCtx.moveTo(0,-6);
    mmCtx.lineTo(4,5);
    mmCtx.lineTo(-4,5);
    mmCtx.closePath();
    mmCtx.fill();
    mmCtx.restore();
  }

  function updateSigns(){
    signHeads.forEach(head=>{
      head.lookAt(camera.position.x, head.position.y, camera.position.z);
    });
  }

  // ---------- ana döngü ----------
  function animate(){
    requestAnimationFrame(animate);
    updateCar();
    updateCamera();
    updateSigns();
    checkProximity();
    drawMinimap();
    renderer.render(scene, camera);
  }
  animate();

})();
</script>
